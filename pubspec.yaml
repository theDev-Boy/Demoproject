name: zuumeet
description: "Zuumeet - Modern P2P Random Video Chat"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.10

  # Google Sign In
  google_sign_in: ^6.2.1

  # Agora SDK for video/audio calls
  agora_uikit: ^1.1.2

  # Voice Messages
  record: ^5.0.0
  audioplayers: ^5.2.0
  path_provider: ^2.1.2

  # Calls background handler
  flutter_callkit_incoming: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # UI Components
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utilities
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Helpers
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  logger: ^2.5.0
  http: ^1.3.0
  lottie: ^3.3.1
  flutter_spinkit: ^5.2.1

  # NEW: Messenger & Notifications
  emoji_picker_flutter: ^4.3.0
  sqflite: ^2.4.1
  path: ^1.9.1
  vibration: ^2.0.1
  flutter_svg: ^2.0.17
  flutter_local_notifications: ^18.0.1
  flutter_ringtone_player: ^4.0.0+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "new_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - new_logo.png
    - new_icon.png
