name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build:
    name: Build & Export APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # Required for newer Android Gradle Plugins

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up consecutive builds by caching flutter SDK

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch Agora UIKit namespace for AGP 8
        run: |
          AGORA_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 2 -type d -name "agora_uikit-*" | head -n 1)
          if [ -z "$AGORA_DIR" ]; then
            echo "agora_uikit package directory not found in pub cache"
            exit 1
          fi
          BUILD_FILE="$AGORA_DIR/android/build.gradle"
          MANIFEST_FILE="$AGORA_DIR/android/src/main/AndroidManifest.xml"
          if [ ! -f "$BUILD_FILE" ]; then
            echo "Missing build.gradle at $BUILD_FILE"
            exit 1
          fi
          NAMESPACE=$(grep -o 'package="[^"]*"' "$MANIFEST_FILE" | head -n 1 | cut -d '"' -f2)
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE="io.agora.uikit"
          fi
          if grep -q "namespace" "$BUILD_FILE"; then
            echo "Namespace already present in $BUILD_FILE"
          else
            sed -i "/android[[:space:]]*{/a\\    namespace \"$NAMESPACE\"" "$BUILD_FILE"
            echo "Injected namespace '$NAMESPACE' into $BUILD_FILE"
          fi

      # NOTE: If you haven't committed the google-services.json file to GitHub for security reasons, 
      # uncomment the lines below and add the base64 string to GitHub Secrets as GOOGLE_SERVICES_JSON.
      # - name: Setup Firebase Config (google-services.json)
      #   run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zuumeet-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14 # The APK will be available for download for 14 days
